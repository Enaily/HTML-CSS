<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        h1 {
            background-color: aquamarine;

            width: 300px;
            height: 300px;

            border: 10px solid blue;

            padding:  10px;
            margin: 20px auto 40px auto;
            /* toda caixa o "margin: auto;" = centralizar
            E pra texto "text-align: center;" */
          
            outline: 7px dashed rgb(83, 13, 196)
        }

        a {
            /*display: block; (se quiser usar)*/
            border-width: 10px;
            border-style: groove;
            color: green;

            padding-top: 10px;
            padding-left: 10px;
            padding-bottom: 10px;
            padding-right: 10px;
            
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level,mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
    
</body>
</html>
