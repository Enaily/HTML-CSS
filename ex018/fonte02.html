<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Love';
            src: url('fonts/love larry ttf.ttf') format('truetype'); /* ou url(fonts/love\ larry\ ttf.ttf) format('truetype'); */

            font-weight: normal;
            font-style: normal;
            
        }

            /*
            Tipo de format()
            -opentype (otf)
            -truetype (ttf)
            -embedded-opentype
            -truetype-aat (Apple Advanced Typography)
            -svg
            */
        
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        
        h1 {
            font-family: 'Love', Times, serif; 
            font-size:  3em;
            font font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá Mundo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Nostrum nisi laudantium facere qui a impedit voluptatem. Ex natus, dolores, recusandae non, quod eum totam officia illum nam soluta sequi pariatur!</p>
    
</body>
</html>
