<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p> Tente abrir esse site em vários dispositivos diferentes ou simpliesmente, entre e diminua o tamanho do seu navegador.</p>
    
    <picture>
        <source media="(max-width: 750px)" srcset="imagem/foto-p.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagem/foto-m.png" type="image/png">
        <img src="imagem/foto-g.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo Àudios</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <p><b>opção 1</b></p>
    <audio src="mídia/sugar-high.mp3" controls autoplay></audio> <!-- MP# WAV OGG-->

    <p><b>Opção 2</b></p>
    <audio preload="metadata"  controls loop>
        <source src="mídia/guanacast-33.mp3" type="audio/mpeg">
        <source src="mídia/guanacast-33.ogg" type="audio/ogg">
        <source src="mídia/guanacast-33.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="mídia/guanacast-33.mp3">Clique aqui para baixar o arquivo MP3.</a></p>
    </audio>

</body>
</html>
